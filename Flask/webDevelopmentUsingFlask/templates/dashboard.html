<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLP Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            min-height:100vh;
        }

        .navbar{
            width:100%;
            height:70px;
            background:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 40px;
            box-shadow:0 3px 10px rgba(0,0,0,0.2);
        }

        .navbar h1{
            color:#1e3a8a;
            font-size:30px;
        }

        .logout-btn{
            text-decoration:none;
            background:#dc2626;
            color:white;
            padding:12px 25px;
            border-radius:8px;
            font-size:18px;
            transition:.3s;
        }

        .logout-btn:hover{
            background:#b91c1c;
        }

        .container{
            width:90%;
            margin:auto;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:40px;
            flex-wrap:wrap;
            margin-top:90px;
        }

        .card{
            width:320px;
            height:250px;
            background:white;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.3);
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            cursor:pointer;
            transition:.35s;
        }

        .card:hover{
            transform:translateY(-12px) scale(1.05);
            background:#2563eb;
            color:white;
        }

        .icon{
            font-size:65px;
            margin-bottom:20px;
        }

        .card h2{
            font-size:28px;
            text-align:center;
        }

        .card p{
            margin-top:15px;
            font-size:17px;
            color:#555;
            text-align:center;
            padding:0 20px;
        }

        .card:hover p{
            color:white;
        }

        @media(max-width:1000px){
            .container{
                margin-top:50px;
            }

            .card{
                width:90%;
                max-width:350px;
            }

            .navbar{
                padding:20px;
            }

            .navbar h1{
                font-size:24px;
            }
        }
    </style>

</head>
<body>

    <div class="navbar">
        <h1>NLP Dashboard</h1>

        <a href="/logout" class="logout-btn">
            Logout
        </a>
    </div>

    <div class="container">

        <div class="card" onclick="location.href='/ner'">
            <div class="icon">📝</div>
            <h2>NER</h2>
            <p>Named Entity Recognition</p>
        </div>

        <div class="card" onclick="location.href='/sentiment'">
            <div class="icon">😊</div>
            <h2>Sentiment Analysis</h2>
            <p>Analyze Positive, Negative & Neutral Sentiments</p>
        </div>

        <div class="card" onclick="location.href='/emotion'">
            <div class="icon">❤️</div>
            <h2>Emotion Detection</h2>
            <p>Detect Human Emotions from Text</p>
        </div>

    </div>

</body>
</html>
