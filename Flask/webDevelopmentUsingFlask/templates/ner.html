<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Named Entity Recognition</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f172a, #1e3a8a);
      }

      .container {
        width: 70%;
        margin: 40px auto;
        background: white;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
      }

      .back-btn {
        text-decoration: none;
        background: #6b7280;
        color: white;
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
      }

      .back-btn:hover {
        background: #4b5563;
      }

      .header h1 {
        flex: 1;
        text-align: center;
        color: #1e3a8a;
        margin-right: 90px;
      }

      label {
        display: block;
        margin-top: 20px;
        margin-bottom: 8px;
        font-size: 18px;
        font-weight: bold;
        color: #333;
      }

      textarea {
        width: 100%;
        height: 220px;
        padding: 15px;
        font-size: 18px;
        resize: none;
        border: 2px solid #ccc;
        border-radius: 10px;
      }

      input[type="text"] {
        width: 100%;
        padding: 15px;
        font-size: 18px;
        border: 2px solid #ccc;
        border-radius: 10px;
      }

      button {
        width: 100%;
        margin-top: 25px;
        padding: 15px;
        font-size: 20px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }

      .result {
        margin-top: 30px;
        padding: 20px;
        border-radius: 10px;
        background: #eef4ff;
        min-height: 120px;
      }
    </style>
  </head>

  <body>
    <div class="container">

      <!-- Header -->
      <div class="header">
        <a href="/dashboard" class="back-btn">⬅ Back</a>
        <h1>📝 Named Entity Recognition</h1>
      </div>

      <form action="/perform_ner" method="post">
        {%if error%}
            <p style="color: red;">{{error}}</p>
        {%endif%}
        <label for="text">Enter Text</label>
        <textarea
          id="text"
          name="text"
          placeholder="Enter your text here..."
          required
        ></textarea>

        <label for="entity">Enter Entity</label>
        <input
          type="text"
          id="entity"
          name="entity"
          placeholder="Example: person, organization, location"
          required
        >

        <button type="submit">Analyze</button>

      </form>

      <div class="result">
        <h2>Result</h2>
        <br>

        {% if response %}
            <p style="color: rgb(43, 115, 4);">{{response}}</p>
        {% endif %}
      </div>

    </div>
  </body>
</html>
