<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLP APP - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
    width:400px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border-radius:18px;
    padding:40px;
    box-shadow:0 15px 35px rgba(0,0,0,.4);
}

.logo{
    text-align:center;
    color:white;
    font-size:38px;
    font-weight:bold;
    letter-spacing:3px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#d9d9d9;
    margin-bottom:35px;
    font-size:15px;
}

.input-box{
    margin-bottom:22px;
}

.input-box label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-size:14px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:15px;
}

.password-box{
    position:relative;
}

.password-box span{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#555;
    font-size:14px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00b4db;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0083b0;
}

.register{
    margin-top:25px;
    text-align:center;
    color:white;
    font-size:15px;
}

.register a{
    color:#FFD54F;
    text-decoration:none;
    font-weight:bold;
}

.register a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

    <div class="logo">
        NLP APP
    </div>

    <div class="subtitle">
        Sign in to continue
    </div>
    {%if message%}
            <p style="color: green;">{{message}}</p>
        {%endif%}

    {%if error%}
            <p style="color: rgb(205, 27, 27);">{{error}}</p>
        {%endif%}
    <form method="post" action="/perform_login">

        <div class="input-box">

            <label>Email Address</label>

            <input
                name="useremail"
                type="email"
                placeholder="Enter your email"
                required>

        </div>

        <div class="input-box">

            <label>Password</label>

            <div class="password-box">

                <input
                    name="userpassword"
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required>

                <span id="toggle" onclick="showPassword()">
                    Show
                </span>

            </div>

        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="register">

        Don't have an account?

        <a href="/register">
            Register Here
        </a>

    </div>

</div>

<script>

function showPassword(){

    let password=document.getElementById("password");
    let toggle=document.getElementById("toggle");

    if(password.type==="password"){
        password.type="text";
        toggle.innerHTML="Hide";
    }
    else{
        password.type="password";
        toggle.innerHTML="Show";
    }

}

</script>

</body>
</html>
