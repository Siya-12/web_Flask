<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Sentiment Analysis</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }

      body {
        background: linear-gradient(135deg, #0f172a, #2563eb);
      }

      .container {
        width: 70%;
        margin: 40px auto;
        background: white;
        padding: 35px;
        border-radius: 15px;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
      }

      .back-btn {
        text-decoration: none;
        background: #6b7280;
        color: white;
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
      }

      .back-btn:hover {
        background: #4b5563;
      }

      .header h1 {
        flex: 1;
        text-align: center;
        color: #2563eb;
        margin-right: 90px;
      }

      textarea {
        width: 100%;
        height: 220px;
        padding: 15px;
        font-size: 18px;
        border-radius: 10px;
        resize: none;
      }

      button {
        width: 100%;
        padding: 15px;
        margin-top: 20px;
        font-size: 20px;
        background: #16a34a;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        background: #15803d;
      }

      .result {
        margin-top: 25px;
        background: #f3f4f6;
        padding: 20px;
        border-radius: 10px;
        min-height: 120px;
      }
    </style>
  </head>

  <body>
    <div class="container">

      <!-- Back Button + Heading -->
      <div class="header">
        <a href="/dashboard" class="back-btn">⬅ Back</a>
        <h1>😊 Sentiment Analysis</h1>
      </div>

      <form action="/perform_sentiment" method="post">
        {%if error%}
            <p style="color: red;">{{error}}</p>
        {%endif%}
        <textarea
          name="text"
          placeholder="Enter text..."
        ></textarea>

        <button type="submit">Analyze Sentiment</button>
      </form>

      <div class="result">
        <h2>Result</h2>
        <br />

        {% if response %}
          <p style="color: green;">{{ response }}</p>
        {% endif %}
      </div>

    </div>
  </body>
</html>
